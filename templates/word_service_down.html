<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word工具暂不可用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h2 { font-size: 1.8rem; color: #333; margin-bottom: 15px; }
        p { color: #666; line-height: 1.6; margin-bottom: 25px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 30px; border-radius: 50px; font-size: 1.1rem;
            font-weight: 600; text-decoration: none; border: none; cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .hint { font-size: 0.85rem; color: #999; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔧</div>
        <h2>Word 文档工具暂不可用</h2>
        <p>Word 文档智能填充服务尚未启动，请先启动 Node.js 服务后重试。</p>
        <a href="/" class="btn">
            <i class="fas fa-home"></i> 返回主页
        </a>
        <button onclick="location.reload()" class="btn" style="background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); margin-top: 10px;">
            <i class="fas fa-sync"></i> 重试
        </button>
        <p class="hint">启动命令: cd /Users/xixi/third_v/backend && npm start</p>
    </div>
</body>
</html>
